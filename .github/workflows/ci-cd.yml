name: CI/CD Pipeline - Site Estático


on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  # JOB 1: Controle de Qualidade (CI)
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js no Runner
        uses: actions/setup-node@v4
        with:
          node-node-version: '20'
          cache: 'npm'

      - name: Instalar as dependências de teste
        run: npm ci

      - name: Validar o HTML
        run: npx htmlhint "**/*.html"

      - name: Validar o CSS
        run: npx stylelint "**/*.css"

      - name: Subir servidor temporário para testar links
        run: |
          npx http-server static_site -p 8080 &
          sleep 3 # Aguarda 3 segundos para garantir que o servidor subiu

      - name: Validar links quebrados
        run: npx blc http://127.0.0.1:8080 -ro

  # JOB 2: Deploy na AWS (CD)
  deploy-aws:
    runs-on: ubuntu-latest
    needs: lint-and-test # Esse job SÓ roda se o 'lint-and-test' passar sem erros!
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Autenticar na AWS via OIDC (Role Temporária)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # Altere para a região onde está seu S3/CloudFront se for diferente

      - name: Sincronizar arquivos com o S3
        run: |
          aws s3 sync static_site/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete
          
      - name: Limpar cache do CloudFront (Invalidação)
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }} --paths "/*"